<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvoiceFlow Launcher</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #f4efe6;
        color: #22180f;
      }

      main {
        width: min(640px, calc(100% - 32px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 251, 245, 0.95);
        box-shadow: 0 20px 50px rgba(61, 37, 18, 0.12);
      }

      h1 {
        margin-top: 0;
      }

      code {
        background: rgba(0, 0, 0, 0.05);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>InvoiceFlow runs as a local server</h1>
      <p>Start it from this folder with <code>npm start</code>, then open <code>http://127.0.0.1:3000</code>.</p>
      <p>The full-stack app includes login, SQLite storage, PDF invoice export, share links, and pending payment reports.</p>
    </main>
  </body>
</html>
